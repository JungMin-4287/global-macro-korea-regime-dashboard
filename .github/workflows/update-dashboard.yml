name: Update Korea market dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "update_dashboard.py"
      - "scripts/**"
      - "templates/**"
      - "docs/js/**"
      - "docs/*.css"
      - "requirements.txt"
      - "docs/data/manual_signals.json"
      - "docs/data/vkospi_manual.json"
      - ".github/workflows/update-dashboard.yml"
  schedule:
    # GitHub Actions cron is UTC. Offset the minute away from :00/:15/:30/:45
    # to reduce shared-runner congestion and refresh every 10 minutes in Korea.
    - cron: "7,17,27,37,47,57 0-6 * * 1-5"  # 09:07~15:57 KST
    - cron: "7,17 7 * * 1-5"                # 16:07, 16:17 KST final-close retries
    - cron: "30 20 * * 1-5"                 # 05:30 KST next day: US close settled (DST)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: korea-market-dashboard
  # Do not cancel a closing refresh merely because the next scheduled run starts.
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update data and HTML
        run: python update_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data
          git diff --cached --quiet || git commit -m "chore: update Korea market dashboard"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs
        continue-on-error: true

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
