name: Update Korea market dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "5 3 * * 1-5"   # 12:05 KST
    - cron: "40 6 * * 1-5"  # 15:40 KST

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update data and HTML
        run: python scripts/update_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data/market_data.json docs/data/market_history.csv
          git diff --cached --quiet || git commit -m "chore: update Korea market dashboard"
          git push
